<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>给你的一句话</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffd6e7, #ffe9f3);
            font-family: "Microsoft YaHei", sans-serif;
        }
        .text {
            font-size: 42px;
            color: #ff4d88;
            font-weight: bold;
            text-align: center;
            padding: 20px 30px;
            background: rgba(255,255,255,0.7);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="text">宝宝，我想你了</div>
</body>
</html>
