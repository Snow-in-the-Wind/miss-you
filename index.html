<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>给宝宝的话</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 30%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.35), transparent 30%),
                linear-gradient(135deg, #ffd1dc, #ffc0cb, #ffb6c1, #ffe4ec);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .overlay {
            position: absolute;
            inset: 0;
            backdrop-filter: blur(2px);
        }

        .container {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 50px 40px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.22);
            box-shadow:
                0 10px 30px rgba(255, 105, 135, 0.18),
                0 0 60px rgba(255, 182, 193, 0.25) inset;
            border: 1px solid rgba(255,255,255,0.35);
            animation: fadeUp 1.5s ease;
            max-width: 90%;
        }

        .small-text {
            color: #ffffff;
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 18px;
            text-shadow: 0 2px 8px rgba(255, 105, 135, 0.25);
        }

        h1 {
            font-size: 52px;
            color: #ff3f7f;
            text-shadow:
                0 0 10px rgba(255,255,255,0.8),
                0 0 20px rgba(255,105,180,0.25);
            min-height: 78px;
            white-space: nowrap;
            border-right: 3px solid rgba(255, 63, 127, 0.85);
            overflow: hidden;
            display: inline-block;
            animation: blink 0.8s infinite;
        }

        .subtext {
            margin-top: 24px;
            font-size: 20px;
            color: #fff;
            opacity: 0;
            animation: showText 2s ease forwards;
            animation-delay: 3.2s;
            text-shadow: 0 2px 8px rgba(255, 105, 135, 0.2);
        }

        .music-btn {
            margin-top: 30px;
            padding: 12px 24px;
            font-size: 16px;
            color: white;
            background: linear-gradient(135deg, #ff6fa1, #ff4f87);
            border: none;
            border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(255, 79, 135, 0.25);
            transition: all 0.25s ease;
        }

        .music-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 12px 24px rgba(255, 79, 135, 0.32);
        }

        .hearts {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            animation: floatUp linear infinite;
            user-select: none;
            filter: drop-shadow(0 0 8px rgba(255, 105, 180, 0.3));
        }

        .glow {
            position: absolute;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.28), transparent 65%);
            z-index: 0;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        @keyframes showText {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: translateY(-115vh) scale(1.5) rotate(25deg);
                opacity: 0;
            }
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.8;
            }
            50% {
                transform: scale(1.12);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 34px;
                min-height: 52px;
            }

            .subtext {
                font-size: 16px;
            }

            .small-text {
                font-size: 14px;
            }

            .container {
                padding: 34px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="glow"></div>

    <div class="hearts" id="hearts"></div>

    <div class="container">
        <div class="small-text">FOR MY BABY</div>
        <h1 id="typing"></h1>
        <div class="subtext">这一刻的想念，正在跨过屏幕奔向你 ❤</div>
        <button class="music-btn" onclick="playMusic()">▶ 播放音乐</button>
    </div>

    <!-- 这里替换成你自己的音乐链接 -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        你的浏览器不支持音频播放。
    </audio>

    <script>
        const text = "宝宝，我想你了";
        const typingEl = document.getElementById("typing");
        let index = 0;

        function typeWriter() {
            if (index < text.length) {
                typingEl.textContent += text.charAt(index);
                index++;
                setTimeout(typeWriter, 220);
            }
        }

        typeWriter();

        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (16 + Math.random() * 24) + "px";
            heart.style.animationDuration = (5 + Math.random() * 5) + "s";
            heart.style.opacity = Math.random();
            heart.style.color = Math.random() > 0.5
                ? "rgba(255,255,255,0.75)"
                : "rgba(255,182,193,0.85)";

            document.getElementById("hearts").appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        setInterval(createHeart, 350);

        const music = document.getElementById("bgMusic");

        function playMusic() {
            music.play().catch(() => {
                alert("浏览器拦截了自动播放，请再点一次播放按钮～");
            });
        }

        window.addEventListener("load", () => {
            music.play().catch(() => {
                console.log("自动播放被浏览器拦截，需要用户点击按钮播放。");
            });
        });
    </script>
</body>
</html>
